<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warpath Classic</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .window { pointer-events: auto; }

        /* Ticker Top Bar */
        #ticker-bar { position: absolute; top: 0; left: 0; width: 100%; background: #c0c0c0; border-bottom: 2px solid #808080; display: flex; padding: 2px 10px; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: bold; z-index: 20; }
        .ticker-item { margin-right: 20px; }

        /* Start Menu Button */
        #start-btn { position: absolute; bottom: 2px; left: 2px; height: 25px; pointer-events: auto; z-index: 40; }

        /* Joysticks */
        .joystick-base { position: absolute; bottom: 40px; width: 120px; height: 120px; background: rgba(192, 192, 192, 0.2); border: 2px solid rgba(192, 192, 192, 0.4); border-radius: 50%; pointer-events: auto; z-index: 30; }
        #joystick-left { left: 40px; }
        #joystick-right { right: 40px; }
        .joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #c0c0c0; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #dfdfdf; pointer-events: none; }

        /* Progress Bars Override */
        .status-bar { display: block !important; height: 12px !important; }
        .status-bar-field { display: block !important; flex-grow: 0 !important; height: 100% !important; }
    </style>
</head>
<body>
    <div id="ticker-bar">
        <span class="ticker-item">CR: <span id="cr-val">1000</span></span>
        <span class="ticker-item">POP: <span id="pop-val">0</span></span>
        <span class="ticker-item" style="flex-grow: 1; text-align: right;" id="timer">05:00</span>
    </div>

    <div id="canvas-container"></div>

    <button id="start-btn" class="window">Start</button>

    <div id="joystick-left" class="joystick-base">
        <div id="knob-left" class="joystick-knob"></div>
    </div>
    <div id="joystick-right" class="joystick-base">
        <div id="knob-right" class="joystick-knob"></div>
    </div>

    <div id="ui-layer">
        <!-- Ship Comms Window -->
        <div class="window" style="width: 220px; position: absolute; top: 40px; left: 10px;">
            <div class="title-bar"><div class="title-bar-text">Ship Comms</div></div>
            <div class="window-body">
                <p>Shields: <span id="shields-txt">100</span>%</p>
                <div class="status-bar"><div id="shields-bar" class="status-bar-field" style="width: 100%; background: #000080;"></div></div>
                <p>Hull: <span id="hull-txt">100</span>%</p>
                <div class="status-bar"><div id="hull-bar" class="status-bar-field" style="width: 100%; background: #008000;"></div></div>
                <div id="loyalty-list" style="margin-top: 10px; font-size: 10px;"></div>
            </div>
        </div>

        <!-- Starbase Shop -->
        <div id="shop-window" class="window" style="width: 250px; position: absolute; top: 40px; right: 10px; display: none;">
            <div class="title-bar"><div class="title-bar-text">Starbase Shop</div></div>
            <div class="window-body">
                <button id="up-speed" style="width:100%; margin-bottom:4px;">Thrust Lvl 1 (500 Cr)</button>
                <button id="up-shields" style="width:100%; margin-bottom:4px;">Shields Lvl 1 (800 Cr)</button>
                <button id="up-damage" style="width:100%;">Lasers Lvl 1 (1000 Cr)</button>
            </div>
        </div>

        <!-- Win/Loss -->
        <div id="end-screen" class="window" style="width: 300px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; text-align: center;">
            <div class="title-bar"><div class="title-bar-text">Mission End</div></div>
            <div class="window-body">
                <h1 id="result-msg">VICTORY</h1>
                <p>The Galaxy has been unified.</p>
                <button onclick="location.reload()">New Mission</button>
            </div>
        </div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        // --- AUDIO ---
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();
        function sfx(f, d, t='square', ramp=true) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(ramp) o.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + d);
            g.gain.setValueAtTime(0.05, audioCtx.currentTime);
            g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // --- SCENE ---
        const scene = new THREE.Scene();
        const aspect = window.innerWidth / window.innerHeight;
        const viewSize = 1000;
        const camera = new THREE.OrthographicCamera(-viewSize*aspect/2, viewSize*aspect/2, viewSize/2, -viewSize/2, 0.1, 1000);
        camera.position.z = 10;
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- CRT SHADER (Scanlines) ---
        const scanlineCanvas = document.createElement('canvas');
        const scanlineCtx = scanlineCanvas.getContext('2d');
        function updateScanlines() {
            scanlineCanvas.width = window.innerWidth; scanlineCanvas.height = window.innerHeight;
            scanlineCtx.fillStyle = 'rgba(18, 16, 16, 0.1)';
            for (let i = 0; i < scanlineCanvas.height; i += 4) scanlineCtx.fillRect(0, i, scanlineCanvas.width, 2);
        }
        updateScanlines();
        scanlineCanvas.style.position = 'absolute'; scanlineCanvas.style.top = '0'; scanlineCanvas.style.left = '0'; scanlineCanvas.style.pointerEvents = 'none'; scanlineCanvas.style.zIndex = '50';
        document.body.appendChild(scanlineCanvas);
        renderer.domElement.style.filter = "contrast(1.2) brightness(1.1)";

        // --- GAME OBJECTS ---
        const shipGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,15,0), new THREE.Vector3(-10,-10,0), new THREE.Vector3(10,-10,0), new THREE.Vector3(0,15,0)]);
        const shipMat = new THREE.LineBasicMaterial({ color: 0x00ffff });
        const playerShip = new THREE.LineLoop(shipGeom, shipMat);
        scene.add(playerShip);

        const shieldGeom = new THREE.RingGeometry(22, 24, 32);
        const shieldMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0 });
        const playerShield = new THREE.Mesh(shieldGeom, shieldMat);
        playerShip.add(playerShield);

        const rivalMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
        const rivalShip = new THREE.LineLoop(shipGeom, rivalMat);
        rivalShip.position.set(-400, 400, 0);
        scene.add(rivalShip);

        const starbase = new THREE.Mesh(new THREE.TorusGeometry(35, 4, 16, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true }));
        scene.add(starbase);

        // --- STATE ---
        const gameState = { time: 300, credits: 1000, pop: 0, over: false };
        const pState = { vel: new THREE.Vector2(), rot: Math.atan2(-300, 200), thrust: 0.5, hp: 100, sh: 100, shMax: 100, shDelay: 0, dmg: 10, dead: false, upLvl: {s:1, sh:1, d:1} };
        const rState = { vel: new THREE.Vector2(), rot: 0, hp: 100, dead: false, target: null, flee: 0 };
        const inputs = { left: { id: null, x: 0, y: 0 }, right: { id: null, active: false, lastFire: 0 } };
        playerShip.rotation.z = pState.rot;

        // --- PLANETS & DRONES ---
        class Planet {
            constructor(x, y, r, name) {
                this.name=name; this.loyalty=0; this.pop=0; this.owner='neutral'; this.radius=r;
                this.mesh=new THREE.Mesh(new THREE.CircleGeometry(r, 32), new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.5 }));
                this.mesh.position.set(x, y, -1);
                this.border=new THREE.Mesh(new THREE.RingGeometry(r, r+3, 32), new THREE.MeshBasicMaterial({ color: 0x888888 }));
                this.border.position.set(x, y, -0.9);
                scene.add(this.mesh); scene.add(this.border);
            }
            update() {
                const dP = playerShip.position.distanceTo(this.mesh.position) < this.radius*2 && !pState.dead;
                const dR = rivalShip.position.distanceTo(this.mesh.position) < this.radius*2 && !rState.dead;
                if (dP && !dR) { this.loyalty = Math.min(100, this.loyalty + 0.1); if(this.loyalty===100 && this.owner!=='player') this.capture('player'); }
                else if (dR && !dP) { this.loyalty = Math.max(-100, this.loyalty - 0.1); if(this.loyalty===-100 && this.owner!=='rival') this.capture('rival'); }

                this.border.material.color.set(this.owner==='player'?0x00ffff:(this.owner==='rival'?0xff0000:(this.loyalty>0?0x004444:(this.loyalty<0?0x440000:0x888888))));
                if(Math.abs(this.loyalty)>0) { if(this.pop===0) this.pop=100; this.pop *= 1.0001; }
            }
            capture(o) {
                this.owner=o; this.mesh.material.color.set(o==='player'?0x004444:0x440000);
                sfx(600, 0.3, 'sine', false);
            }
        }
        const planets = [new Planet(300, 200, 45, "Xylos"), new Planet(-250, -150, 35, "Ygor"), new Planet(100, -300, 55, "Zion")];

        const droneMesh = new THREE.InstancedMesh(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array([0,2,0, -1,-1,0, 1,-1,0]), 3)), new THREE.MeshBasicMaterial({ color: 0xffff00 }), 100);
        scene.add(droneMesh);
        const drones = Array.from({length: 100}, () => ({ p: null, a: Math.random()*6.28, dist: 70+Math.random()*30, s: 0.02+Math.random()*0.02, pos: new THREE.Vector3(), state: 'ORBIT' }));

        // --- PROJECTILES & PARTICLES ---
        const projectiles = [], particles = [];
        function fire(o, ship, dmg) {
            if (ship.parent === null) return;
            const m = new THREE.Mesh(new THREE.PlaneGeometry(2, 10), new THREE.MeshBasicMaterial({ color: o==='player'?0x00ffff:0xffaaaa }));
            m.position.copy(ship.position); m.rotation.copy(ship.rotation);
            projectiles.push({ o, m, v: new THREE.Vector2(-Math.sin(ship.rotation.z)*15, Math.cos(ship.rotation.z)*15), life: 100, dmg });
            scene.add(m); sfx(400, 0.05);
            // Recoil
            const rec = new THREE.Vector2(Math.sin(ship.rotation.z)*0.5, -Math.cos(ship.rotation.z)*0.5);
            if(o==='player') pState.vel.add(rec); else rState.vel.add(rec);
        }

        function explode(x, y, color) {
            for(let i=0; i<15; i++) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(3,3,3), new THREE.MeshBasicMaterial({ color }));
                m.position.set(x, y, 0);
                particles.push({ m, v: new THREE.Vector2((Math.random()-0.5)*12, (Math.random()-0.5)*12), life: 50 });
                scene.add(m);
            }
            sfx(100, 0.4, 'sawtooth');
        }

        // --- CONTROLS ---
        const joyL = document.getElementById('joystick-left'), knobL = document.getElementById('knob-left');
        const joyR = document.getElementById('joystick-right'), knobR = document.getElementById('knob-right');

        const handleTouch = (e, isStart) => {
            for(let t of e.changedTouches) {
                const x = t.clientX, y = t.clientY;
                if (x < window.innerWidth/2) {
                    if (isStart) inputs.left.id = t.identifier;
                    if (t.identifier === inputs.left.id) {
                        const r = joyL.getBoundingClientRect(), dx = x-(r.left+60), dy = y-(r.top+60), d = Math.sqrt(dx*dx+dy*dy), m = Math.min(d, 50);
                        const cDx = (dx/d)*m, cDy = (dy/d)*m;
                        knobL.style.transform = `translate(calc(-50% + ${cDx}px), calc(-50% + ${cDy}px))`;
                        // Deadzone 10% (5px of 50px)
                        inputs.left.x = Math.abs(cDx) > 5 ? cDx/50 : 0;
                        inputs.left.y = Math.abs(cDy) > 5 ? cDy/50 : 0;
                    }
                } else {
                    if (isStart) { inputs.right.id = t.identifier; inputs.right.active = true; fire('player', playerShip, pState.dmg); }
                }
            }
        };
        const endTouch = (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === inputs.left.id) { inputs.left.id=null; inputs.left.x=0; inputs.left.y=0; knobL.style.transform='translate(-50%,-50%)'; }
                if(t.identifier === inputs.right.id) { inputs.right.id=null; inputs.right.active=false; }
            }
        };
        window.addEventListener('touchstart', e => handleTouch(e, true), {passive:false});
        window.addEventListener('touchmove', e => handleTouch(e, false), {passive:false});
        window.addEventListener('touchend', endTouch);

        // --- SHOP & UI ---
        const loyaltyList = document.getElementById('loyalty-list');
        planets.forEach(p => { const d = document.createElement('div'); d.innerHTML = `<div>${p.name}</div><div class="status-bar"><div id="loy-${p.name}" class="status-bar-field" style="width:0%; background:#000080;"></div></div>`; loyaltyList.appendChild(d); });

        const buy = (id, cost, level, nextCost, key, factor) => {
            const btn = document.getElementById(id);
            btn.onclick = () => {
                if(gameState.credits >= cost) {
                    gameState.credits -= cost; pState.upLvl[key]++;
                    const nCost = Math.floor(cost * 1.5);
                    btn.innerText = `${btn.innerText.split('(')[0]}Lvl ${pState.upLvl[key]} (${nCost} Cr)`;
                    if(key==='s') pState.thrust *= 1.2;
                    if(key==='sh') { pState.shMax += 50; pState.sh = pState.shMax; }
                    if(key==='d') pState.dmg += 10;
                    sfx(800, 0.1, 'sine', false);
                }
            };
        };
        buy('up-speed', 500, 1, 750, 's'); buy('up-shields', 800, 1, 1200, 'sh'); buy('up-damage', 1000, 1, 1500, 'd');

        setInterval(() => {
            if(gameState.over) return; gameState.time--;
            if(gameState.time<=0) { gameState.over=true; document.getElementById('end-screen').style.display='block'; }
            const m=Math.floor(gameState.time/60), s=gameState.time%60; document.getElementById('timer').innerText=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);

        // --- LOOP ---
        function loop() {
            requestAnimationFrame(loop);
            if(gameState.over) return;

            // Physics (Snappy Rotation 360/s = ~0.1 rad/frame)
            if(!pState.dead) {
                if(Math.abs(inputs.left.x)>0) pState.rot -= inputs.left.x * 0.15;
                playerShip.rotation.z = pState.rot;
                if(inputs.left.y < -0.2) { pState.vel.x -= Math.sin(pState.rot)*pState.thrust; pState.vel.y += Math.cos(pState.rot)*pState.thrust; }
                pState.vel.multiplyScalar(0.98);
                playerShip.position.x += pState.vel.x; playerShip.position.y += pState.vel.y;
                if(inputs.right.active && Date.now()-inputs.right.lastFire > 200) { fire('player', playerShip, pState.dmg); inputs.right.lastFire = Date.now(); }
            }

            // Rival AI
            if(!rState.dead) {
                if(rState.flee > 0) { rState.flee--; const f = new THREE.Vector2().subVectors(rivalShip.position, playerShip.position).normalize(); rState.vel.add(f.multiplyScalar(0.4)); }
                else {
                    if(!rState.target || rState.target.owner==='rival') rState.target = planets.find(p=>p.owner!=='rival');
                    if(rState.target) { const s = new THREE.Vector2().subVectors(rState.target.mesh.position, rivalShip.position).normalize(); rState.vel.add(s.multiplyScalar(0.3)); rivalShip.rotation.z = Math.atan2(-s.x, s.y); }
                }
                rState.vel.multiplyScalar(0.98); rivalShip.position.x += rState.vel.x; rivalShip.position.y += rState.vel.y;
                if(Math.random()<0.01 && rivalShip.position.distanceTo(playerShip.position)<400) fire('rival', rivalShip, 10);
            }

            // Update Objects
            let totalPop = 0;
            planets.forEach(p => {
                p.update(); totalPop += (p.owner==='player'?p.pop:0);
                const b = document.getElementById(`loy-${p.name}`);
                b.style.width = `${Math.abs(p.loyalty)}%`; b.style.background = p.loyalty > 0 ? '#000080' : '#800000';
            });
            gameState.pop = totalPop; gameState.credits += totalPop * 0.0001;
            document.getElementById('cr-val').innerText = Math.floor(gameState.credits);
            document.getElementById('pop-val').innerText = Math.floor(gameState.pop);
            document.getElementById('shields-txt').innerText = Math.floor(pState.sh);
            document.getElementById('shields-bar').style.width = `${(pState.sh/pState.shMax)*100}%`;
            document.getElementById('hull-txt').innerText = Math.floor(pState.hp);
            document.getElementById('hull-bar').style.width = `${pState.hp}%`;
            document.getElementById('shop-window').style.display = playerShip.position.distanceTo(starbase.position)<150 ? 'block' : 'none';

            // Drones
            let dIdx = 0;
            planets.forEach(p => {
                if(p.owner==='neutral') return;
                for(let i=0; i<5; i++) {
                    const d = drones[dIdx++]; d.p = p; d.a += d.s;
                    const oX = p.mesh.position.x + Math.cos(d.a)*d.dist, oY = p.mesh.position.y + Math.sin(d.a)*d.dist;
                    d.pos.set(oX, oY, 0);
                    const enemy = (p.owner==='player'?rivalShip:playerShip);
                    const enemyState = (p.owner==='player'?rState:pState);
                    if(!enemyState.dead && enemy.position.distanceTo(p.mesh.position)<300) {
                        d.pos.add(new THREE.Vector3().subVectors(enemy.position, d.pos).normalize().multiplyScalar(4));
                        // Papercut damage
                        if(d.pos.distanceTo(enemy.position) < 20) {
                            if(enemyState.sh > 0) enemyState.sh -= 0.1; else enemyState.hp -= 0.1;
                        }
                    }
                    droneMesh.setMatrixAt(dIdx-1, new THREE.Matrix4().setPosition(d.pos));
                }
            });
            droneMesh.instanceMatrix.needsUpdate = true;

            // Projectiles
            for(let i=projectiles.length-1; i>=0; i--) {
                const pr = projectiles[i]; pr.m.position.x += pr.v.x; pr.m.position.y += pr.v.y; pr.life--;
                let hit = false;
                if(pr.o==='rival' && !pState.dead && pr.m.position.distanceTo(playerShip.position)<25) {
                    if(pState.sh > 0) { pState.sh -= pr.dmg; playerShield.material.opacity = 0.8; } else { pState.hp -= pr.dmg; }
                    pState.shDelay = 180; hit = true; sfx(200, 0.1, 'sawtooth');
                    if(pState.hp <= 0) { pState.dead=true; explode(playerShip.position.x, playerShip.position.y, 0x00ffff); scene.remove(playerShip); setTimeout(()=> {gameState.over=true; document.getElementById('end-screen').style.display='block'; document.getElementById('result-msg').innerText='PATH TERMINATED';}, 2000); }
                } else if(pr.o==='player' && !rState.dead && pr.m.position.distanceTo(rivalShip.position)<25) {
                    rState.hp -= pr.dmg; rState.flee = 180; hit = true; sfx(200, 0.1, 'sawtooth');
                    if(rState.hp <= 0) { rState.dead=true; explode(rivalShip.position.x, rivalShip.position.y, 0xff0000); scene.remove(rivalShip); }
                }
                if(pr.life<=0 || hit) { scene.remove(pr.m); pr.m.geometry.dispose(); projectiles.splice(i, 1); }
            }
            if(pState.shDelay > 0) pState.shDelay--; else pState.sh = Math.min(pState.shMax, pState.sh + 0.1);
            playerShield.material.opacity = Math.max(0, playerShield.material.opacity - 0.05);

            // Particles
            for(let i=particles.length-1; i>=0; i--) {
                const pt = particles[i]; pt.m.position.x += pt.v.x; pt.m.position.y += pt.v.y; pt.life--;
                if(pt.life<=0) { scene.remove(pt.m); pt.m.geometry.dispose(); particles.splice(i, 1); }
            }

            renderer.render(scene, camera);
            scanlineCtx.drawImage(renderer.domElement, 0, 0); // Not efficient but works for "Vibe"
        }
        loop();
        window.addEventListener('resize', () => { const a = window.innerWidth / window.innerHeight; camera.left = -viewSize*a/2; camera.right = viewSize*a/2; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); updateScanlines(); });
    </script>
</body>
</html>
