<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warpath Classic</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ticker-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #c0c0c0;
            border-top: 2px solid #fff;
            padding: 2px 10px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            z-index: 20;
        }
        #ticker-text {
            display: inline-block;
            animation: scroll-left 20s linear infinite;
        }
        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .window {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ticker-container">
        <div id="ticker-text">GALACTIC NEWS: LOYALTY SHIFTS REPORTED IN ALPHA CENTAURI... POPULATION GROWTH EXPLODING ON CYAN PLANETS... TAX REVENUE STABLE...</div>
    </div>
    <div id="ui-layer">
        <div class="window" style="width: 300px; position: absolute; top: 10px; left: 10px;">
            <div class="title-bar">
                <div class="title-bar-text">Ship Comms</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body">
                <p>System: Alpha Centauri</p>
                <p>Credits: <span id="credits">1000</span></p>
                <p>Population: <span id="population">0</span></p>
                <div id="planet-loyalty-container">
                    <!-- Loyalty bars will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera Setup
        const aspect = window.innerWidth / window.innerHeight;
        const viewSize = 1000;
        const camera = new THREE.OrthographicCamera(
            -viewSize * aspect / 2, viewSize * aspect / 2,
            viewSize / 2, -viewSize / 2,
            0.1, 1000
        );
        camera.position.z = 10;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Player Ship
        const shipShape = new THREE.Shape();
        shipShape.moveTo(0, 15);
        shipShape.lineTo(-10, -10);
        shipShape.lineTo(10, -10);
        shipShape.lineTo(0, 15);

        const shipGeometry = new THREE.BufferGeometry().setFromPoints(shipShape.getPoints());
        const shipMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff });
        const ship = new THREE.LineLoop(shipGeometry, shipMaterial);
        scene.add(ship);

        // Planets
        class Planet {
            constructor(x, y, radius, name) {
                this.name = name;
                this.loyalty = 0; // -100 to 100
                this.population = 0;
                this.owner = 'neutral'; // 'neutral', 'player', 'rival'
                this.radius = radius;
                this.captureRadius = 150;

                const geometry = new THREE.CircleGeometry(radius, 32);
                const material = new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.5 });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(x, y, -1);
                scene.add(this.mesh);

                // Border
                const borderGeometry = new THREE.RingGeometry(radius, radius + 2, 32);
                const borderMaterial = new THREE.MeshBasicMaterial({ color: 0x888888 });
                this.border = new THREE.Mesh(borderGeometry, borderMaterial);
                this.border.position.set(x, y, -0.9);
                scene.add(this.border);
            }

            update(shipPos) {
                const dist = shipPos.distanceTo(this.mesh.position);

                // Loyalty Logic
                if (dist < this.captureRadius) {
                    if (this.owner !== 'player') {
                        this.loyalty += 0.1; // Shift toward player
                        if (this.loyalty >= 100) {
                            this.loyalty = 100;
                            this.capture('player');
                        }
                    }
                }

                // Visuals based on owner
                if (this.owner === 'player') {
                    this.border.material.color.set(0x00ffff);
                } else if (this.owner === 'rival') {
                    this.border.material.color.set(0xff0000);
                } else if (this.loyalty > 0) {
                    const pulse = Math.sin(Date.now() * 0.01) * 0.2 + 0.8;
                    this.border.material.color.setRGB(0, 0.5 * pulse, 0.5 * pulse);
                } else {
                    this.border.material.color.set(0x888888);
                }

                // Population Growth
                if (this.loyalty > 0) {
                    if (this.population === 0) this.population = 100; // Initial seed
                    this.population *= 1.0001; // Growth per frame
                }
            }

            capture(newOwner) {
                this.owner = newOwner;
                if (newOwner === 'player') {
                    this.mesh.material.color.set(0x004444);
                    this.border.material.color.set(0x00ffff);
                }
                console.log(`${this.name} captured by ${newOwner}!`);
            }
        }

        const planets = [
            new Planet(300, 200, 40, "Xylos"),
            new Planet(-250, -150, 30, "Ygor"),
            new Planet(100, -300, 50, "Zion")
        ];

        // Drone Manager
        class DroneManager {
            constructor(count) {
                this.count = count;
                const geometry = new THREE.BufferGeometry();
                const vertices = new Float32Array([
                    0, 2, 0,
                    -1, -1, 0,
                    1, -1, 0
                ]);
                geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
                const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                this.mesh = new THREE.InstancedMesh(geometry, material, count);
                scene.add(this.mesh);

                this.drones = [];
                for (let i = 0; i < count; i++) {
                    this.drones.push({
                        planet: null,
                        angle: Math.random() * Math.PI * 2,
                        distance: 60 + Math.random() * 40,
                        speed: 0.02 + Math.random() * 0.02,
                        position: new THREE.Vector3()
                    });
                }
            }

            update(shipPos) {
                let droneIdx = 0;
                planets.forEach(p => {
                    if (p.owner === 'player') {
                        // Assign 5 drones to this planet if not already assigned
                        let assignedCount = 0;
                        for (let i = 0; i < this.count && assignedCount < 5; i++) {
                            const d = this.drones[i];
                            if (d.planet === null || d.planet === p) {
                                d.planet = p;
                                assignedCount++;

                                // Orbit logic
                                d.angle += d.speed;
                                const targetX = p.mesh.position.x + Math.cos(d.angle) * d.distance;
                                const targetY = p.mesh.position.y + Math.sin(d.angle) * d.distance;

                                d.position.set(targetX, targetY, 0);

                                // Intercept logic
                                const distToShip = shipPos.distanceTo(p.mesh.position);
                                if (distToShip < 300) {
                                    const dirToShip = new THREE.Vector3().subVectors(shipPos, d.position).normalize();
                                    d.position.add(dirToShip.multiplyScalar(3));
                                }

                                const matrix = new THREE.Matrix4();
                                matrix.setPosition(d.position);
                                this.mesh.setMatrixAt(i, matrix);
                            }
                        }
                    }
                });
                this.mesh.instanceMatrix.needsUpdate = true;
            }
        }

        const droneManager = new DroneManager(100);

        // Initialize UI Loyalty Bars
        const loyaltyContainer = document.getElementById('planet-loyalty-container');
        planets.forEach(p => {
            const div = document.createElement('div');
            div.style.marginBottom = '10px';
            div.innerHTML = `
                <div style="font-size: 10px;">${p.name}</div>
                <div class="status-bar" style="width: 100%; height: 15px;">
                    <div id="loyalty-${p.name}" class="status-bar-field" style="width: 0%; height: 100%; background: #000080;"></div>
                </div>
            `;
            loyaltyContainer.appendChild(div);
        });

        // Economy State
        const economy = {
            credits: 1000,
            population: 0,
            taxRate: 0.0001
        };

        // Projectiles
        const projectiles = [];
        function fireProjectile() {
            const points = [
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(0, 20, 0)
            ];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: 0xffffff });
            const projectile = new THREE.LineSegments(geometry, material);

            projectile.position.copy(ship.position);
            projectile.rotation.copy(ship.rotation);

            const velocity = new THREE.Vector2(
                -Math.sin(ship.rotation.z) * 15,
                Math.cos(ship.rotation.z) * 15
            );

            projectiles.push({
                mesh: projectile,
                velocity: velocity,
                life: 120 // 2 seconds at 60fps
            });
            scene.add(projectile);
        }

        // Movement State
        const player = {
            velocity: new THREE.Vector2(0, 0),
            rotation: 0,
            thrust: 0.5,
            friction: 0.98,
            maxRotationSpeed: 0.08
        };

        const keys = {};
        const touchState = {
            isThrusting: false,
            rotation: 0, // -1 for left, 1 for right
            startX: 0,
            startY: 0
        };

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') fireProjectile();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Touch Controls
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            touchState.startX = touch.clientX;
            touchState.startY = touch.clientY;
            touchState.isThrusting = true; // Any touch starts thrusting for simplicity
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const dx = touch.clientX - touchState.startX;

            // Map horizontal movement to rotation
            if (dx > 20) touchState.rotation = -1;
            else if (dx < -20) touchState.rotation = 1;
            else touchState.rotation = 0;

        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            // Tap to fire
            const duration = Date.now() - touchState.startTime;
            fireProjectile();

            touchState.isThrusting = false;
            touchState.rotation = 0;
        }, { passive: false });

        // Resize handler
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -viewSize * aspect / 2;
            camera.right = viewSize * aspect / 2;
            camera.top = viewSize / 2;
            camera.bottom = -viewSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);

            // Update Drones
            droneManager.update(ship.position);

            // Update Planets & Economy
            let totalPop = 0;
            planets.forEach(p => {
                const oldLoyalty = p.loyalty;
                p.update(ship.position);

                if (p.owner === 'player') {
                    totalPop += p.population;
                }

                // Drain credits if actively capturing
                if (p.loyalty > oldLoyalty && p.owner !== 'player' && ship.position.distanceTo(p.mesh.position) < p.captureRadius) {
                    economy.credits -= 0.2;
                }

                // Update UI
                const bar = document.getElementById(`loyalty-${p.name}`);
                if (bar) bar.style.width = `${Math.max(0, p.loyalty)}%`;
            });

            // Calculate Taxes
            economy.population = totalPop;
            economy.credits += economy.population * economy.taxRate;

            // Update Economy UI
            document.getElementById('credits').innerText = Math.floor(economy.credits);
            document.getElementById('population').innerText = Math.floor(economy.population);

            // Handle Rotation
            if (keys['KeyA'] || touchState.rotation > 0) player.rotation += player.maxRotationSpeed;
            if (keys['KeyD'] || touchState.rotation < 0) player.rotation -= player.maxRotationSpeed;
            ship.rotation.z = player.rotation;

            // Handle Thrust
            if (keys['KeyW'] || touchState.isThrusting) {
                player.velocity.x -= Math.sin(player.rotation) * player.thrust;
                player.velocity.y += Math.cos(player.rotation) * player.thrust;
            }

            // Apply Friction
            player.velocity.multiplyScalar(player.friction);

            // Update Position
            ship.position.x += player.velocity.x;
            ship.position.y += player.velocity.y;

            // Update Projectiles
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                p.mesh.position.x += p.velocity.x;
                p.mesh.position.y += p.velocity.y;
                p.life--;

                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    projectiles.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
