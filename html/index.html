<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VibeSnake 2.5D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff88;
            pointer-events: none;
            z-index: 10;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff3333;
            font-size: 48px;
            text-align: center;
            display: none;
            text-shadow: 0 0 20px #ff3333;
            z-index: 20;
        }
        #restart-btn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <div id="game-over">
        GAME OVER
        <br>
        <button id="restart-btn" onclick="resetGame()">RESTART</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Capacitor Haptics placeholder for browser testing
        let Haptics = { impact: async () => {} };
        let ImpactStyle = { Light: 'LIGHT', Heavy: 'HEAVY' };

        // Attempt to load Capacitor Haptics
        try {
            const hapticsModule = await import('https://unpkg.com/@capacitor/haptics@6.0.0/dist/esm/index.js');
            Haptics = hapticsModule.Haptics;
            ImpactStyle = hapticsModule.ImpactStyle;
        } catch (e) {
            console.warn("Capacitor Haptics not loaded, using placeholder.");
        }

        // Game Constants
        const GRID_SIZE = 20;
        const MOVE_SPEED = 300; // ms
        const INITIAL_SNAKE = [{x: 10, z: 10}, {x: 10, z: 11}, {x: 10, z: 12}];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        // Camera Setup (Orthographic 2.5D)
        const aspect = window.innerWidth / window.innerHeight;
        const d = 15;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        camera.position.set(30, 30, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Industrial Environment Map (Procedural)
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const envScene = new THREE.Scene();
        const envGeometry = new THREE.BoxGeometry(10, 10, 10);
        const envMaterial = new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.BackSide });
        const envBox = new THREE.Mesh(envGeometry, envMaterial);
        envScene.add(envBox);

        // Add some "lights" to the env map for reflections
        for (let i = 0; i < 5; i++) {
            const lightGeom = new THREE.BoxGeometry(1, 4, 0.1);
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const lightMesh = new THREE.Mesh(lightGeom, lightMat);
            lightMesh.position.set(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10
            );
            lightMesh.lookAt(0,0,0);
            envScene.add(lightMesh);
        }

        const envRenderTarget = pmremGenerator.fromScene(envScene);
        scene.environment = envRenderTarget.texture;

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.6,  // strength
            0.4,  // radius
            0.85  // threshold
        );
        composer.addPass(bloomPass);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 500, 100);
        pointLight.position.set(5, 10, 5);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 1024;
        pointLight.shadow.mapSize.height = 1024;
        scene.add(pointLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(-10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // Texture Loader
        const textureLoader = new THREE.TextureLoader();

        // Floor PBR
        const floorTexture = textureLoader.load('assets/textures/floor_rusted.png');
        const floorNormal = textureLoader.load('assets/textures/floor_normal.png');
        const floorRoughness = textureLoader.load('assets/textures/floor_roughness.png');
        [floorTexture, floorNormal, floorRoughness].forEach(t => {
            // No tiling for the floor, unique 2048px texture
            t.wrapS = t.wrapT = THREE.ClampToEdgeWrapping;
            t.minFilter = THREE.LinearMipmapLinearFilter;
        });

        // Use distinct materials for the floor slab to avoid UV stretching on the sides
        const floorTopMaterial = new THREE.MeshStandardMaterial({
            map: floorTexture,
            normalMap: floorNormal,
            roughnessMap: floorRoughness,
            metalness: 0.5,
            roughness: 1.0
        });

        // Side material - reusing beam texture for the slab edges
        const floorSideMaterial = new THREE.MeshStandardMaterial({
            color: 0x333333,
            metalness: 0.8,
            roughness: 0.5
        });

        const floorGeometry = new THREE.BoxGeometry(GRID_SIZE, 0.5, GRID_SIZE);
        // BoxGeometry materials: [x+, x-, y+, y-, z+, z-]
        const floorMaterials = [
            floorSideMaterial, floorSideMaterial, // Left/Right
            floorTopMaterial,  floorSideMaterial, // Top/Bottom
            floorSideMaterial, floorSideMaterial  // Front/Back
        ];

        const floor = new THREE.Mesh(floorGeometry, floorMaterials);
        floor.position.y = -0.25;
        floor.receiveShadow = true;
        scene.add(floor);

        // Grid (Subtle overlay)
        const gridHelper = new THREE.GridHelper(GRID_SIZE, GRID_SIZE, 0x000000, 0x000000);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Materials
        const snakeTexture = textureLoader.load('assets/textures/snake_body_diffuse.png');
        const snakeNormal = textureLoader.load('assets/textures/snake_body_normal.png');
        const snakeRoughness = textureLoader.load('assets/textures/snake_body_roughness.png');
        const snakeMaterial = new THREE.MeshStandardMaterial({
            map: snakeTexture,
            normalMap: snakeNormal,
            roughnessMap: snakeRoughness,
            metalness: 0.3
        });

        const foodTexture = textureLoader.load('assets/textures/battery_label.png');
        const foodMaterial = new THREE.MeshStandardMaterial({
            map: foodTexture,
            emissive: 0xff0000,
            emissiveIntensity: 1.0,
            roughness: 0.3
        });
        const cubeGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);

        // Game State
        let snake = [...INITIAL_SNAKE];
        let direction = {x: 0, z: -1};
        let nextDirection = {x: 0, z: -1};
        let food = {x: 5, z: 5};
        let score = 0;
        let isGameOver = false;
        let lastMoveTime = 0;

        const snakeMeshes = [];
        const foodMesh = new THREE.Mesh(cubeGeometry, foodMaterial);
        scene.add(foodMesh);

        // Walls / Beams PBR
        const wallTexture = textureLoader.load('assets/textures/wall_beam_metal.png');
        const wallNormal = textureLoader.load('assets/textures/wall_beam_normal.png');
        const wallRoughness = textureLoader.load('assets/textures/wall_beam_roughness.png');
        [wallTexture, wallNormal, wallRoughness].forEach(t => {
            t.wrapS = t.wrapT = THREE.RepeatWrapping;
            t.repeat.set(5, 1); // Less repetition for better look
        });

        const wallMaterial = new THREE.MeshStandardMaterial({
            map: wallTexture,
            normalMap: wallNormal,
            roughnessMap: wallRoughness,
            metalness: 0.7,
            roughness: 0.8
        });

        function createEdgeBeam(x, y, z, w, h, d) {
            const beam = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMaterial);
            beam.position.set(x, y, z);
            beam.castShadow = true;
            beam.receiveShadow = true;
            scene.add(beam);
        }

        // Horizontal Perimeter Frame (Moved outward so they don't overlap with the grid)
        const bw = 0.6; // beam width
        const offset = (GRID_SIZE / 2) + (bw / 2);
        createEdgeBeam(0, 0.2, -offset, GRID_SIZE + (bw * 2), 0.8, bw); // Back
        createEdgeBeam(0, 0.2, offset, GRID_SIZE + (bw * 2), 0.8, bw);  // Front
        createEdgeBeam(-offset, 0.2, 0, bw, 0.8, GRID_SIZE + (bw * 2)); // Left
        createEdgeBeam(offset, 0.2, 0, bw, 0.8, GRID_SIZE + (bw * 2));  // Right

        function updateSnakeMeshes() {
            snakeMeshes.forEach(m => scene.remove(m));
            snakeMeshes.length = 0;

            snake.forEach(pos => {
                const mesh = new THREE.Mesh(cubeGeometry, snakeMaterial);
                mesh.position.set(pos.x - GRID_SIZE/2 + 0.5, 0.45, pos.z - GRID_SIZE/2 + 0.5);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                snakeMeshes.push(mesh);
            });
        }

        foodMesh.castShadow = true;
        function updateFoodMesh() {
            foodMesh.position.set(food.x - GRID_SIZE/2 + 0.5, 0.45, food.z - GRID_SIZE/2 + 0.5);
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * GRID_SIZE),
                z: Math.floor(Math.random() * GRID_SIZE)
            };
            // Ensure food doesn't spawn on snake
            if (snake.some(p => p.x === food.x && p.z === food.z)) {
                spawnFood();
            }
        }

        async function triggerHaptic(style) {
            try {
                await Haptics.impact({ style });
            } catch (e) {
                // Ignore if not on device
            }
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            triggerHaptic(ImpactStyle.Heavy);
        }

        window.resetGame = function() {
            snake = [{x: 10, z: 10}, {x: 10, z: 11}, {x: 10, z: 12}];
            direction = {x: 0, z: 0}; // Start stationary
            nextDirection = {x: 0, z: 0};
            score = 0;
            isGameOver = false;
            document.getElementById('ui').innerText = `Score: ${score}`;
            document.getElementById('game-over').style.display = 'none';
            spawnFood();
            updateSnakeMeshes();
            updateFoodMesh();
        };

        function moveSnake() {
            if (isGameOver) return;
            if (nextDirection.x === 0 && nextDirection.z === 0) return; // Don't move until input

            direction = nextDirection;
            const head = { x: snake[0].x + direction.x, z: snake[0].z + direction.z };

            // Wall collision
            if (head.x < 0 || head.x >= GRID_SIZE || head.z < 0 || head.z >= GRID_SIZE) {
                return gameOver();
            }

            // Self collision
            if (snake.some(p => p.x === head.x && p.z === head.z)) {
                return gameOver();
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.z === food.z) {
                score++;
                document.getElementById('ui').innerText = `Score: ${score}`;
                spawnFood();
                updateFoodMesh();
                triggerHaptic(ImpactStyle.Light);
            } else {
                snake.pop();
            }

            updateSnakeMeshes();
        }

        // Input Handling
        let touchStart = null;
        window.addEventListener('touchstart', (e) => {
            touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (touchStart) e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (!touchStart) return;
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) { // Screen Right -> Top-Right (-Z)
                        if (direction.z === 0) nextDirection = { x: 0, z: -1 };
                    } else { // Screen Left -> Bottom-Left (+Z)
                        if (direction.z === 0) nextDirection = { x: 0, z: 1 };
                    }
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy > 0) { // Screen Down -> Bottom-Right (+X)
                        if (direction.x === 0) nextDirection = { x: 1, z: 0 };
                    } else { // Screen Up -> Top-Left (-X)
                        if (direction.x === 0) nextDirection = { x: -1, z: 0 };
                    }
                }
            }
            touchStart = null;
        });

        window.addEventListener('keydown', (e) => {
            /**
             * Screen-relative mapping for Isometric view (Camera at 30,30,30):
             * - ArrowUp:    Move Top-Left (-X)
             * - ArrowDown:  Move Bottom-Right (+X)
             * - ArrowLeft:  Move Bottom-Left (+Z)
             * - ArrowRight: Move Top-Right (-Z)
             */
            if (e.key === 'ArrowUp')    { if (direction.x === 0) nextDirection = { x: -1, z: 0 }; }
            if (e.key === 'ArrowDown')  { if (direction.x === 0) nextDirection = { x: 1, z: 0 }; }
            if (e.key === 'ArrowLeft')  { if (direction.z === 0) nextDirection = { x: 0, z: 1 }; }
            if (e.key === 'ArrowRight') { if (direction.z === 0) nextDirection = { x: 0, z: -1 }; }
        });

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Game Loop
        function animate(time) {
            requestAnimationFrame(animate);

            // Stable Industrial Light
            pointLight.intensity = 600;

            if (time - lastMoveTime > MOVE_SPEED) {
                moveSnake();
                lastMoveTime = time;
            }

            composer.render();
        }

        resetGame();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
