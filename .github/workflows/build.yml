name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Bob
        run: |
          SHA1=$(curl -s https://d.defold.com/stable/info.json | jq -r .sha1)
          curl -L -O https://d.defold.com/archive/stable/${SHA1}/bob/bob.jar

      - name: Resolve dependencies
        run: java -jar bob.jar resolve

      - name: Build and Bundle (HTML5)
        run: |
          mkdir -p _build/html5
          java -jar bob.jar --archive --platform js-web build bundle --bundle-output _build/html5

      - name: Build and Bundle (Android)
        run: |
          mkdir -p _build/android
          java -jar bob.jar --archive --platform arm64-android build bundle --bundle-output _build/android

      - name: Prepare Netlify Upload
        run: |
          # The output of bob.jar bundle for js-web is a folder named after the project title.
          # We want the content of that folder in the root of _build for Netlify.
          cp -r _build/html5/Snake/* _build/
          # Ensure index.html exists in _build
          if [ ! -f _build/index.html ]; then
            echo "Error: index.html not found in _build!"
            exit 1
          fi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-android-apk
          path: _build/android/Snake/*.apk

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_build --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
