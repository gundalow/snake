name: Android Build and Netlify Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true # Crucial if you have large assets

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Debug Keystore
        # Godot requires a keystore file even for debug exports.
        # This creates a temporary one in the runner.
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Download Godot Templates
        # Manually placing templates where the Godot binary expects them
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/4.3.stable
          wget -O templates.zip https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip templates.zip -d /tmp/godot_templates
          mv /tmp/godot_templates/* ~/.local/share/godot/export_templates/4.3.stable/
          rm -rf /tmp/godot_templates*

      - name: Create Build Folder
        run: mkdir -v -p build/android

      - name: Export APK
        # We pass the Android SDK path and ensure Godot finds the keystore
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          godot --headless --export-debug "Android" build/android/snake.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/android/snake.apk

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './deploy'
          production-deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy Android APK to Netlify"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
