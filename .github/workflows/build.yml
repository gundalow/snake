name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Bob
        run: |
          SHA1=$(curl -s https://d.defold.com/stable/info.json | jq -r .sha1)
          curl -L -O https://d.defold.com/archive/stable/${SHA1}/bob/bob.jar

      - name: Resolve dependencies
        run: java -jar bob.jar resolve

      - name: Build and Bundle (HTML5)
        run: |
          mkdir -p _build/html5
          java -jar bob.jar --archive --platform js-web build bundle --bundle-output _build/html5

      - name: Build and Bundle (Android)
        run: |
          mkdir -p _build/android
          java -jar bob.jar --archive --platform arm64-android build bundle --bundle-output _build/android

      - name: Debug Output Directory Structure
        run: |
          echo "Listing HTML5 output directory:"
          ls -R _build/html5
          echo "Listing Android output directory:"
          ls -R _build/android

      - name: Prepare Netlify Upload
        run: |
          # Copy HTML5 build to a root-level Netlify directory
          mkdir -p _netlify
          cp -r _build/html5/*/ . || true
          # We need to find the actual bundle folder. Bob usually nests it like _build/html5/<project_name>/...
          # Let's find index.html and move its parent's contents to _netlify
          HTML_PATH=$(find _build/html5 -name index.html)
          if [ -z "$HTML_PATH" ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          HTML_DIR=$(dirname "$HTML_PATH")
          cp -r "$HTML_DIR"/* _netlify/
          if [ ! -f _netlify/index.html ]; then
            echo "Error: index.html not found in _netlify!"
            exit 1
          fi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-android-apk
          path: _build/android/**/*.apk

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_netlify --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
