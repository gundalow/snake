name: Build Game

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Defold Bob
        uses: dl-with-love/setup-defold@v1
        with:
          version: '1.6.4' # Use the latest stable version

      - name: Build HTML5
        run: |
          java -jar bob.jar --archive --platform js-web build
          java -jar bob.jar --platform js-web bundle --bundle-output build/html5

      - name: Build Android
        run: |
          java -jar bob.jar --archive --platform armv7-android build
          java -jar bob.jar --platform armv7-android bundle --bundle-output build/android

      - name: Upload HTML5 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: html5-bundle
          path: build/html5/

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle
          path: build/android/

      - name: Prepare Netlify Upload
        run: |
          mkdir -p _netlify
          # Dynamically find the index.html and its directory content in build/html5
          HTML_PATH=$(find build/html5 -name index.html)
          if [ -z "$HTML_PATH" ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          HTML_DIR=$(dirname "$HTML_PATH")
          cp -r "$HTML_DIR"/* _netlify/

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_netlify --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
