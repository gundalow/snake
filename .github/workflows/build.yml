name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Bob
        run: |
          SHA1=$(curl -s https://d.defold.com/stable/info.json | jq -r .sha1)
          curl -L -O https://d.defold.com/archive/stable/${SHA1}/bob/bob.jar

      - name: Resolve dependencies
        run: java -jar bob.jar resolve

      - name: Build and Bundle
        run: |
          mkdir -p _build
          java -jar bob.jar --archive --platform x86_64-web build bundle --bundle-output _build/x86_64-web

      - name: Debug Output Directory
        run: |
          echo "Listing all files in _build/x86_64-web:"
          ls -R _build/x86_64-web
          echo "---"

      - name: Prepare Netlify Upload
        run: |
          # The output of bob.jar bundle for x86_64-web is usually a folder named after the project title.
          # In game.project, title = Snake. So the folder should be 'Snake'.
          # We want the content of that folder in the root of _build.
          cp -r _build/x86_64-web/Snake/* _build/
          # Ensure index.html exists in _build
          if [ ! -f _build/index.html ]; then
            echo "Error: index.html not found in _build!"
            exit 1
          fi

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_build --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
