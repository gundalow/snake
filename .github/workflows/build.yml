name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download Bob
        run: |
          SHA1=$(curl -s https://d.defold.com/stable/info.json | jq -r .sha1)
          curl -L -O https://d.defold.com/archive/stable/${SHA1}/bob/bob.jar

      - name: Resolve dependencies
        run: java -jar bob.jar resolve

      - name: Build and Bundle (HTML5)
        run: |
          java -jar bob.jar --archive --platform js-web build bundle --bundle-output _build/html5

      - name: Build and Bundle (Android)
        run: |
          # Building for arm64-android. Use --bundle-format apk to generate the installable file.
          java -jar bob.jar --archive --platform arm64-android --architectures arm64-android build bundle --bundle-output _build/android --bundle-format apk

      - name: Prepare Netlify Upload
        run: |
          mkdir -p _netlify
          # Dynamically find the index.html and its directory content
          find _build/html5 -name index.html -exec cp -r {}/.. _netlify/ \;
          # Cleanup if the find-exec didn't quite do what we wanted (it might copy the folder itself)
          if [ -d _netlify/js-web ]; then
            mv _netlify/js-web/* _netlify/
            rm -rf _netlify/js-web
          fi
          # Specific check for Snake folder if Bob output it that way
          if [ -d _netlify/Snake ]; then
            mv _netlify/Snake/* _netlify/
            rm -rf _netlify/Snake
          fi

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snake-android-apk
          path: _build/android/**/*.apk

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_netlify --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
