name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Bob
        run: |
          BOB_VERSION=$(curl -s https://d.defold.com/stable/info.json | jq -r .version)
          curl -L -o bob.jar https://d.defold.com/archive/stable/${BOB_VERSION}/bob/bob.jar

      - name: Resolve dependencies
        run: java -jar bob.jar resolve

      - name: Build and Bundle
        run: |
          mkdir -p _build
          java -jar bob.jar --archive --platform x86_64-web build bundle --bundle-output _build/x86_64-web

      - name: Prepare Netlify Upload
        run: |
          mv _build/x86_64-web/Snake/* _build/
          rm -rf _build/x86_64-web

      - name: Upload to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --dir=_build --prodIfMain
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
