name: Android Build and Netlify Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        run: |
          apt-get update && apt-get install -y wget unzip openjdk-17-jdk-headless

          # Setup SDK paths
          export ANDROID_HOME=$HOME/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools

          # Download command line tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip cmdline-tools.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest

          # Install components
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "build-tools;34.0.0" "platforms;android-34"

          # Set outputs for next steps
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Setup Godot Templates
        run: |
          VERSION="4.3"
          mkdir -p ~/.local/share/godot/export_templates/${VERSION}.stable
          wget https://github.com/godotengine/godot/releases/download/${VERSION}-stable/Godot_v${VERSION}-stable_export_templates.tpz
          unzip Godot_v${VERSION}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${VERSION}.stable/
          rm -rf templates Godot_v${VERSION}-stable_export_templates.tpz

      - name: Build Android APK
        run: |
          # Create a debug keystore
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

          # Discover Java path
          JAVA_SDK_PATH=$(dirname $(dirname $(readlink -f $(which javac))))

          # Configure Godot Editor Settings
          mkdir -p ~/.config/godot
          echo '[gd_resource type="EditorSettings" format=3]' > ~/.config/godot/editor_settings-4.tres
          echo '' >> ~/.config/godot/editor_settings-4.tres
          echo '[resource]' >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/java_sdk_path = \"$JAVA_SDK_PATH\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/debug_keystore = \"$(pwd)/debug.keystore\"" >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-4.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-4.tres

          # Headless import
          godot --headless --editor --quit

          mkdir -p build/android
          godot --headless --export-debug "Android" build/android/snake.apk

      - name: Verify and Prepare Deployment
        run: |
          APK_PATH="build/android/snake.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
          mkdir -p deploy
          cp "$APK_PATH" deploy/snake-game.apk
          echo '<html><body><h1>Industrial Snake</h1><p>Latest Build</p><a href="snake-game.apk">Download APK</a></body></html>' > deploy/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './deploy'
          production-deploy: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy Android APK to Netlify"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
